<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>M10 — Encerrar Sessão</title><link rel="stylesheet" href="_ds.css"></head>
<body>
<div class="frame">
  <div class="uc-tag">M10 · UC02 + UC03</div>
  <div class="statusbar"><span>9:41</span><span class="icons">●●●●● 5G ⛁</span></div>

  <div class="header">
    <div class="back">←</div>
    <div class="title">Encerrar sessão</div>
  </div>

  <div class="body">
    <div style="text-align: center; padding: 16px 0;">
      <div style="font-size: 12px; color: var(--text-2); text-transform: uppercase; font-weight: 600;">Duração</div>
      <div style="font-size: 36px; font-weight: 700; color: var(--primary); font-feature-settings: 'tnum';">47:08</div>
      <div style="font-size: 13px; color: var(--text-2);">Maria Luiza · sessão #12</div>
    </div>

    <div class="section-title" style="margin-top: 8px;">Compareceu?</div>
    <div style="display: flex; gap: 8px;">
      <div style="flex: 1; padding: 12px; border: 2px solid var(--primary); border-radius: 12px; background: var(--primary-50); text-align: center;">
        <div style="font-size: 22px;">✓</div>
        <div style="font-weight: 600; color: var(--primary-700); font-size: 13px; margin-top: 2px;">Sim</div>
      </div>
      <div style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center;">
        <div style="font-size: 22px; color: var(--text-3);">✗</div>
        <div style="font-weight: 600; color: var(--text-2); font-size: 13px; margin-top: 2px;">No-show</div>
      </div>
    </div>

    <div class="section-title">Tipo de evolução</div>
    <div class="input" style="justify-content: space-between;">
      <span style="font-weight: 600;">Sessão regular — TCC</span>
      <span style="color: var(--text-3);">▾</span>
    </div>

    <div class="section-title">Pagamento agora?</div>
    <div class="card" style="padding: 0;">
      <div class="radio-row" style="padding: 12px 14px; border-bottom: 1px solid var(--border);">
        <div class="radio-circle on"></div>
        <div style="flex: 1;">
          <div style="font-weight: 600; font-size: 14px;">Sim — R$ 200,00</div>
        </div>
      </div>
      <div class="radio-row" style="padding: 12px 14px;">
        <div class="radio-circle"></div>
        <div style="flex: 1;">
          <div style="font-weight: 600; font-size: 14px; color: var(--text-2);">Cobrar depois</div>
        </div>
      </div>
    </div>

    <div class="section-title">Forma de pagamento</div>
    <div style="display: flex; gap: 8px;">
      <div style="flex: 1; padding: 12px 8px; border: 1px solid var(--border); border-radius: 12px; text-align: center;">
        <div style="font-size: 22px;">💵</div>
        <div style="font-size: 12px; color: var(--text-2); margin-top: 4px;">Dinheiro</div>
      </div>
      <div style="flex: 1; padding: 12px 8px; border: 2px solid var(--primary); background: var(--primary-50); border-radius: 12px; text-align: center;">
        <div style="font-size: 22px;">⚡</div>
        <div style="font-size: 12px; font-weight: 700; color: var(--primary-700); margin-top: 4px;">PIX</div>
      </div>
      <div style="flex: 1; padding: 12px 8px; border: 1px solid var(--border); border-radius: 12px; text-align: center;">
        <div style="font-size: 22px;">💳</div>
        <div style="font-size: 12px; color: var(--text-2); margin-top: 4px;">Cartão</div>
      </div>
    </div>
  </div>

  <div class="cta-bottom">
    <button class="btn btn-success">Encerrar e enviar recibo</button>
  </div>

  <div class="homebar"></div>
</div>
</body></html>
