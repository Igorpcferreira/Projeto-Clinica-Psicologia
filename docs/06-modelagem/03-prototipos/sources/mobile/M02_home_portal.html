<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>M02 — Home Portal</title><link rel="stylesheet" href="_ds.css"></head>
<body>
<div class="frame">
  <div class="uc-tag">M02 · UC_Portal_Paciente</div>
  <div class="statusbar"><span>9:41</span><span class="icons">●●●●● 5G ⛁</span></div>

  <div class="header" style="border-bottom: none;">
    <div class="icon-btn">☰</div>
    <div style="display: flex; flex-direction: column;">
      <span style="font-size: 12px; color: var(--text-2);">Olá,</span>
      <span style="font-size: 17px; font-weight: 700;">Maria 👋</span>
    </div>
    <div class="right"><div class="icon-btn">🔔</div></div>
  </div>

  <div class="body">
    <div class="section-title" style="margin-top: 0;">Próxima sessão</div>
    <div class="card card-primary">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
          <div style="font-size: 12px; opacity: 0.85;">QUINTA, 10 MAI</div>
          <div style="font-size: 28px; font-weight: 700; margin-top: 4px;">14:00</div>
          <div style="margin-top: 8px; display: flex; align-items: center; gap: 8px;">
            <div class="avatar" style="background: rgba(255,255,255,0.2);">K</div>
            <span style="font-weight: 600;">Karla Niana</span>
          </div>
          <span class="pill" style="background: rgba(255,255,255,0.2); color: white; margin-top: 10px;">📹 Online</span>
        </div>
      </div>
      <div style="display: flex; gap: 8px; margin-top: 16px;">
        <button class="btn" style="background: white; color: var(--primary); height: 44px;">Confirmar</button>
        <button class="btn" style="background: rgba(255,255,255,0.2); color: white; height: 44px;">Remarcar</button>
      </div>
    </div>

    <div class="section-title">Ações</div>
    <div class="stack stack-2">
      <div class="card" style="display: flex; align-items: center; gap: 12px; padding: 14px;">
        <div style="width: 40px; height: 40px; border-radius: 12px; background: var(--primary-50); display: flex; align-items: center; justify-content: center; font-size: 18px;">📅</div>
        <span style="flex: 1; font-weight: 600;">Marcar consulta</span>
        <span style="color: var(--text-3); font-size: 18px;">›</span>
      </div>
      <div class="card" style="display: flex; align-items: center; gap: 12px; padding: 14px;">
        <div style="width: 40px; height: 40px; border-radius: 12px; background: var(--success-50); display: flex; align-items: center; justify-content: center; font-size: 18px;">📄</div>
        <span style="flex: 1; font-weight: 600;">Recibos</span>
        <span style="color: var(--text-3); font-size: 18px;">›</span>
      </div>
      <div class="card" style="display: flex; align-items: center; gap: 12px; padding: 14px;">
        <div style="width: 40px; height: 40px; border-radius: 12px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 18px;">👤</div>
        <span style="flex: 1; font-weight: 600;">Meus dados</span>
        <span style="color: var(--text-3); font-size: 18px;">›</span>
      </div>
      <div class="card" style="display: flex; align-items: center; gap: 12px; padding: 14px;">
        <div style="width: 40px; height: 40px; border-radius: 12px; background: #FEF3C7; display: flex; align-items: center; justify-content: center; font-size: 18px;">🔒</div>
        <div style="flex: 1;">
          <div style="font-weight: 600;">Privacidade</div>
          <div style="font-size: 12px; color: var(--text-2);">LGPD · seus direitos</div>
        </div>
        <span style="color: var(--text-3); font-size: 18px;">›</span>
      </div>
    </div>
  </div>

  <div class="homebar"></div>
</div>
</body></html>
